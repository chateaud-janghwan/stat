<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>약품 사용량 추세</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>약품 사용량 추세</h1>
            <p id="masterStatus">기준 피벗 확인 중</p>
          </div>
          <a id="masterDownload" class="button secondary" href="/download-master" hidden>기준 피벗 다운로드</a>
        </header>

        <section class="analysis-grid">
          <div class="tool-panel search-panel">
            <div class="panel-header">
              <h2>약품 검색</h2>
            </div>
            <label class="search-box">
              <input id="searchInput" type="search" placeholder="약품코드, KD코드, 약품명, 성분명" autocomplete="off" />
            </label>
            <div id="searchResults" class="result-list"></div>
          </div>

          <div class="tool-panel chart-panel">
            <div class="chart-heading">
              <div>
                <h2 id="chartTitle">품목을 선택하세요</h2>
                <p id="chartMeta"></p>
              </div>
            </div>
            <div id="chartMount" class="chart-mount">
              <div class="empty-state">검색 결과에서 품목을 선택하면 월별 사용량이 표시됩니다.</div>
            </div>
          </div>
        </section>

        <section class="tool-panel update-panel">
          <div class="panel-header">
            <h2>월별 업데이트</h2>
            <button id="processButton" type="button">업데이트</button>
          </div>

          <div class="panel-grid">
            <label class="field">
              <span>연월</span>
              <input id="monthInput" type="text" placeholder="비워두면 원본 엑셀의 연월을 자동 인식합니다" />
            </label>

            <div class="dropzone" data-target="source">
              <input id="sourceFile" type="file" accept=".xlsx,.xlsm,.xltx,.xltm" multiple />
              <strong>월별 원본 엑셀</strong>
              <span id="sourceName">여러 파일을 한 번에 선택할 수 있습니다</span>
            </div>

            <div class="dropzone optional" data-target="pivot">
              <input id="pivotFile" type="file" accept=".xlsx,.xlsm,.xltx,.xltm" />
              <strong>기존 피벗 가져오기</strong>
              <span id="pivotName">기준 피벗을 교체할 때만 선택</span>
            </div>
          </div>

          <section class="status-panel" aria-live="polite">
            <div id="statusText">대기 중</div>
            <dl id="stats"></dl>
            <a id="downloadLink" class="button" hidden>업데이트 결과 다운로드</a>
          </section>
        </section>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
